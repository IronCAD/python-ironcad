name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"   # triggers on version tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade wheel twine 
          pip install build
          pip install 'setuptools<69' --force-reinstall

      - name: Build package
        run: |
          python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
          # No password needed for Trusted Publisher
          # Only publish if this is not a pre-release (optional, remove if you want to publish pre-releases)
        if: ${{ !contains(github.ref, '-rc') && !contains(github.ref, '-dev') }}